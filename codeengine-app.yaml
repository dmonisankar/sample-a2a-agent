apiVersion: codeengine.cloud.ibm.com/v1beta1
kind: Application
metadata:
  name: currency-agent-app
  labels:
    app.kubernetes.io/name: currency-agent
spec:
  imageReference: # Will be set by build or specified image
  managedDomainMappings: public
  run:
    arguments: []
    env:
      - name: GOOGLE_API_KEY
        valueFrom:
          secretKeyRef:
            name: api-keys
            key: google-api-key
      - name: model_source
        value: google
    resources:
      requests:
        cpu: 0.25
        memory: 0.5Gi
      limits:
        cpu: 0.5
        memory: 1Gi
  scale:
    minReplicas: 0
    maxReplicas: 5
    concurrency: 100
---
apiVersion: v1
kind: Secret
metadata:
  name: api-keys
type: Opaque
stringData:
  google-api-key: "your_google_api_key_here"  # Replace with actual key
